<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Unhealthy Life</title>
<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:"Times New Roman", Times, serif;
}
body{

font-family:Times New Roman", Times, serif;

color:#fff;

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

}
#bg-video{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

pointer-events:none;

z-index:-2;

}
body::before{

content:"";

position:fixed;

inset:0;

background:rgba(0,0,0,.35);

z-index:-1;

pointer-events:none;

}
.top-panel{
    width:700px;
    margin:20px auto 30px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:20px;

    padding:20px 30px;

    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.game{width:min(430px,95vw)}
.top{text-align:center;margin-bottom:10px}
.day{opacity:.8;margin-top:6px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.stat{background:rgba(255,255,255,.06);padding:8px;border-radius:12px}
.label{font-size:12px}
.bar{height:8px;background:#333;border-radius:99px;margin-top:6px;overflow:hidden}
.fill{height:100%;transition:.35s}
.up{outline:2px solid #44ff88}
.down{outline:2px solid #ff6666}
.stack{position:relative;height:350px}
.back1,.back2,.card{
position:absolute;left:0;width:100%;border-radius:26px
}
.back1{height:100%;top:16px;background:#2a3245;opacity:.4}
.back2{height:100%;top:8px;background:#39435b;opacity:.6}
.card{
height:100%;background:#f7f4ee;color:#1a1a1a;
padding:26px;box-shadow:0 20px 50px rgba(0,0,0,.4);
display:flex;flex-direction:column;justify-content:center;align-items:center;
text-align:center;user-select:none;cursor:grab;
transition:transform .15s;z-index:10;
}
.card{

transition:.25s;

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 25px 60px rgba(0,0,0,.4);

}
.avatar{

width:140px;

height:140px;

object-fit:contain;

margin-bottom:15px;

pointer-events:none;

user-select:none;

}
.card h2{margin-bottom:10px}
.card hr{
    opacity:.2;
    margin:25px 0;
}
.choice{
position:absolute;top:50%;transform:translateY(-50%);
width:140px;font-weight:bold;opacity:0;transition:.15s;z-index:999;pointer-events: none;
}
.left{left:-20px;text-align:right;color:#ff7b7b}
.right{right:-20px;text-align:left;color:#6dde89}
.preview{font-size:13px;margin-top:6px}
.overlay{
position:fixed;inset:0;background:rgba(0,0,0,.92);
display:none;justify-content:center;align-items:center;
flex-direction:column;text-align:center;padding:20px
}
.flags{

    display:flex;

    justify-content:center;

    gap:10px;

    margin-top:12px;

    min-height:40px;

}

.flag{

    width:38px;

    height:38px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:24px;

    background:rgba(255,255,255,.15);

    border-radius:12px;

    backdrop-filter:blur(8px);

}
button{padding:12px 20px;border:none;border-radius:12px;cursor:pointer}
</style>
</head>
<body>
<video id="bg-video" autoplay muted loop playsinline>
    <source src="videos/rainy.mp4" type="video/mp4">
</video>
<div class="game">
<div class="top">
<h1>Your Unhealthy Life</h1>
<div class="day">Day <span id="day">1</span></div>
<div id="flagsBar" class="flags"></div>
</div>

<div class="stats" id="stats"></div>

<div class="stack">
<div class="back1"></div>
<div class="back2"></div>

<div class="card" id="card">

<div class="choice left" id="leftBox"></div>
<div class="choice right" id="rightBox"></div>

<img id="avatar" class="avatar" src="images/adu.png">
<h2 id="title"></h2>
<p id="text"></p>
</div>
</div>
</div>

<div class="overlay" id="end">
<h1 id="endTitle"></h1>
<p id="endText" style="margin:20px 0"></p>
<button onclick="location.reload()">Chơi lại</button>
</div>

<script>
let flags = {};
let stats={mental:50,finance:50,social:50,energy:50};
let day=1;

const names={mental:"🧠 Tinh thần",finance:"💰 Tài chính",social:"👥 Xã hội",energy:"⚡ Năng lượng"};
const avatars=[

"images/adu.png",

"images/buonia.png",

"images/dafuq.png",

"images/ded.png",

"images/fatmf.png",

"images/nerd.png",

"images/smug.png",

"images/trungbacthao.png"

];

const flagIcons={

    love:"❤️",

    parttime:"💼",

    hardworking:"📚",

    sick:"🤒",

    burnout:"🔥",

    rich:"💰",

    gym:"💪"

};

const cards=[
["Báo thức","Chuông báo thức reo lúc 6h sáng. Bạn có tiết học lúc 7h.","Ngủ tiếp",{mental:10,energy:5,finance:-8},"Thức dậy đi học",{finance:5,energy:-7,mental:-12,flag:"hardworking"},"ded.png"],
["Cà phê","Bạn bè rủ bạn đi uống cà phê.","Đồng ý",{social:8,finance:-5},"Ở nhà nghỉ ngơi",{energy:5,social:-8},"adu.png"],
["Deadline gấp","Bài tập đã đến hạn, bạn cần phải làm việc thâu đêm.","Mặc kệ và nghỉ ngơi",{mental:5,energy:8,finance:-5},"Làm tiếp",{finance:7,energy:-15,mental:-8},"buonia.png"],
["Làm thêm","Bạn có cơ hội nhận một công việc parttime.","Nhận việc",{finance:7,energy:-8,flag:"parttime"},"Từ chối",{},"smug.png"],
["Lướt Tiktok","Nửa đêm, nằm lướt Tiktok. Bạn nhìn đồng hồ mới 12 giờ.","Lướt thêm tí nữa",{mental:5,energy:-10},"Đi ngủ",{energy:8},"smug.png"],
["Flash Sale","Một món đồ bạn đã thích từ lâu đang được giảm giá.","Chốt đơn",{mental:8,finance:-10},"Thôi bỏ qua",{mental:-5},"smug.png"],
["Ăn đêm","Nửa đêm, bạn đang hơi đói.","Dậy ăn đêm",{mental:8,energy:5,finance:-10},"Nhịn đói",{energy:-5,mental:-8},"fatmf.png"],
["Thể dục thể thao","Bạn của bạn rủ đi đá bóng, bạn sẽ.","Đồng ý",{mental:5,social:8,energy:-8,finance:-5},"Từ chối",{social:-5},"adu.png"],
["Đi du lịch","Bạn bè rủ đi chơi cuối tuần.","Đi",{mental:8,social:8,finance:-15,energy:-8},"Ở nhà",{energy:8,mental:-5,social:-5},"adu.png"],
["Khóa học online","Một khóa học đang miễn phí.","Học",{mental:6,finance:3,energy:-4},"Bỏ qua",{},"nerd.png"],
["Dọn phòng","Phòng trọ rất bừa bộn.","Dọn ngay",{mental:8,energy:-10},"Để mai",{mental:-6},"buonia.png"],
["Bạn thất tình","Bạn thân muốn tâm sự với bạn.","Lắng nghe",{social:10,energy:-4},"Từ chối",{social:-8},"adu.png"],
["Đi bộ","Quãng đường về nhà khoảng 2km.","Đi bộ",{mental:5,energy:-8},"Đi xe ôm",{finance:-8,energy:5},"trungbacthao.png"],
["Khám sức khỏe","Trường tổ chức khám sức khỏe miễn phí.","Đi khám",{mental:3,energy:2},"Bỏ qua",{},"trungbacthao.png"],
["Lương về","Bạn vừa nhận lương tháng.","Tiết kiệm",{finance:12},"Mua đồ",{mental:8,finance:-10},"smug.png",{requireFlag:"parttime"}],
["Mất điện","Phòng trọ bị cúp điện tối nay.","Ra quán cà phê",{mental:5,finance:-6,energy:-5},"Đi ngủ sớm",{energy:10},"dafuq.png"],
["Chơi game","Bạn bè rủ chơi game đến khuya.","Chơi",{mental:8,social:5,energy:-10},"Từ chối",{energy:6,social:-5},"adu.png"],
["Đọc sách","Bạn mua một cuốn sách phát triển bản thân.","Đọc ngay",{mental:5,energy:-5},"Để sau",{mental:-5},"nerd.png"],
["Nhận học bổng","Bạn đạt học bổng học kỳ.","Ăn mừng",{mental:10,finance:3,removeFlag:"hardworking"},"Tiết kiệm",{finance:5,removeFlag:"hardworking"},"smug.png",{requireFlag:"hardworking"}],
["Bạn bè nhờ giúp","Bạn bè nhờ bạn hỗ trợ việc gấp.","Giúp",{social:8,energy:-5},"Từ chối",{energy:5,social:-6},"adu.png"],
["Trời mưa","Sáng nay trời mưa lớn.","Đi xe bus",{finance:-6,energy:5},"Đi xe máy",{energy:-8,flag:"sick"},"buonia.png"],
["Mất ví","Bạn phát hiện ví không còn trong balo.","Làm lại giấy tờ",{finance:-15,mental:-8},"Bình tĩnh tìm",{mental:-6},"ded.png"],
["Khuyến mãi đồ ăn","App giao đồ ăn giảm 50%.","Đặt món",{mental:6,finance:-5},"Tự nấu",{finance:6,energy:-8},"fatmf.png"],
["Thức khuya","Đã 2 giờ sáng nhưng bạn chưa ngủ.","Ngủ ngay",{energy:10},"Làm tiếp",{finance:5,energy:-12,mental:-8},"dafuq.png"],
["Xem phim","Phim mới đang công chiếu.","Đi xem",{mental:8,energy:-5,finance:-10},"Tiếp tục học",{finance:5,mental:-8},"buonia.png"],
["Học nhóm","Bạn được rủ học nhóm cuối tuần.","Tham gia",{social:8,mental:5,energy:-8},"Từ chối",{energy:5,social:-8},"adu.png"],
["Burnout","Bạn cảm thấy kiệt quệ và không muốn làm điều gì cả.","Nghỉ ngơi một ngày",{mental:15,finance:-8},"Cố chịu đựng",{finance:5,mental:-10,energy:-10},"ded.png",{mentalMax:20}],
["Thất bại","Dự án nhóm bị điểm thấp.","Tự trách",{mental:-12},"Rút kinh nghiệm",{mental:6},"ded.png"],
["Mất động lực","Bạn không muốn làm bất cứ việc gì.","Nghỉ ngơi",{mental:8},"Ép bản thân",{finance:5,mental:-8,energy:-10},"buonia.png",{mentalMax:35}],
["Khủng hoảng hiện sinh","Bạn tự hỏi liệu những gì mình đang làm có ý nghĩa không.","Suy ngẫm",{mental:8,energy:-10},"Mặc kệ",{finance:5,mental:-8},"trungbacthao.png",{mentalMax:30}],
["Bạn được tỏ tình","Có người bày tỏ tình cảm với bạn.","Đồng ý",{social:7,mental:8,flag:"love"},"Từ chối",{mental:-8},"smug.png"],
];

// Bộ bài hiện tại
let deck = [];

function shuffle(array){

    // Fisher-Yates Shuffle
    for(let i = array.length - 1; i > 0; i--){

        let j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];
    }

    return array;
}

function createDeck(){

    // Copy toàn bộ cards sang deck
deck=[...cards];

    // Trộn deck
    shuffle(deck);

    console.log("Đã tạo bộ bài mới:", deck.length, "lá");
}

const card=document.getElementById("card");
const avatar=document.getElementById("avatar");
const leftBox=document.getElementById("leftBox");
const rightBox=document.getElementById("rightBox");

function renderStats(){
const wrap=document.getElementById("stats");
wrap.innerHTML="";
for(const k in stats){
wrap.innerHTML+=`
<div class="stat" id="s_${k}">
<div class="label">${names[k]} ${stats[k]}</div>
<div class="bar"><div class="fill" style="width:${stats[k]}%;background:${k=="mental"?"#ff74c8":k=="finance"?"#67dd67":k=="social"?"#67c4ff":"#ffc86b"}"></div></div>
</div>`;
}

}
function updateAvatar(image){

 avatar.src="images/"+image;
}
function arrows(effect){

    return Object.keys(effect)

    .filter(k =>
        k!="flag" &&
        k!="removeFlag"
    )

    .map(k=>{

        if(effect[k]>0)
            return names[k].split(" ")[0];

        if(effect[k]<0)
            return names[k].split(" ")[0];

    })

    .filter(Boolean)

    .join("<br>");
}
let current;
function nextCard(){

do{

    if(deck.length==0){

        createDeck();

    }

    current = deck.pop();

}while(!checkCondition(current));

console.log(
    "Lá bài:",
    current[0],
    "| Còn lại:",
    deck.length
);

    title.textContent = current[0];

    text.textContent = current[1];

updateAvatar(current[6]);

    leftBox.innerHTML =
        "<b>" + current[2] + "</b>" +
        "<div class='preview'>" +
        arrows(current[3]) +
        "</div>";

    rightBox.innerHTML =
        "<b>" + current[4] + "</b>" +
        "<div class='preview'>" +
        arrows(current[5]) +
        "</div>";

    card.style.opacity = 1;

}

function checkCondition(card){

    let condition = card[7];

    if(!condition) return true;

if(condition.requireFlag != null){

        if(!flags[condition.requireFlag]){

            return false;

        }

    }


    if(condition.mentalMin != null && stats.mental < condition.mentalMin)
        return false;

    if(condition.mentalMax != null && stats.mental > condition.mentalMax)
        return false;

    if(condition.financeMin != null && stats.finance < condition.financeMin)
        return false;

    if(condition.financeMax != null && stats.finance > condition.financeMax)
        return false;

    if(condition.socialMin != null && stats.social < condition.socialMin)
        return false;

    if(condition.socialMax != null && stats.social > condition.socialMax)
        return false;

    if(condition.energyMin != null && stats.energy < condition.energyMin)
        return false;

    if(condition.energyMax != null && stats.energy > condition.energyMax)
        return false;

    return true;

}

function apply(effect){
for(let k in effect){
    if(!(k in stats)) continue;let before=stats[k];
stats[k]=Math.max(0,Math.min(100,stats[k]+effect[k]));
}
if(effect.flag){

    flags[effect.flag]=true;

}

if(effect.removeFlag){

    delete flags[effect.removeFlag];

}
renderFlags();

let gameOver = false;

renderStats();

if(stats.mental<=0)return end("🤯","Bạn đã phát điên");
if(stats.social<=0)return end("💀","Bạn chết vì cô đơn");
if(stats.finance<=0)return end("💀","Bạn đã chết đói");
if(stats.energy<=0)return end("💀","Bạn chết vì kiệt sức");
if(day>=20)return end("🏆","Bạn đã cân bằng được cuộc sống của mình");

day++;
document.getElementById("day").textContent=day;
nextCard();
}

function renderFlags(){

    const bar=document.getElementById("flagsBar");

    bar.innerHTML="";

    for(let key in flags){

        if(flags[key]){

            let div=document.createElement("div");

            div.className="flag";

            div.textContent=flagIcons[key] || "❔";

            div.title=key;

            bar.appendChild(div);

        }

    }

}

function end(t,m){

gameOver = true;

card.style.display = "none";

endTitle.textContent=t;
endText.textContent=m;
document.getElementById("end").style.display="flex";
}

let start=0,dx=0,drag=false;

function down(e){
drag=true;
start=(e.touches?e.touches[0].clientX:e.clientX);
}
function move(e){
if(!drag)return;
dx=(e.touches?e.touches[0].clientX:e.clientX)-start;
let p=Math.min(Math.abs(dx)/180,1);
card.style.transform=`translateX(${dx}px) rotate(${dx/18}deg) scale(${1-p*0.05})`;
leftBox.style.opacity=dx<0?p:0;
rightBox.style.opacity=dx>0?p:0;
}
function up(){
if(!drag)return;
drag=false;

if(dx>140){
card.style.transition=".2s";
card.style.transform="translateX(120vw) rotate(25deg) scale(.9)";
setTimeout(()=>{
card.style.transition="";
card.style.transform="";
apply(current[5]);
},200);
}
else if(dx<-140){
card.style.transition=".2s";
card.style.transform="translateX(-120vw) rotate(-25deg) scale(.9)";
setTimeout(()=>{
card.style.transition="";
card.style.transform="";
apply(current[3]);
},200);
}
else{
card.style.transform="";
}
leftBox.style.opacity=0;
rightBox.style.opacity=0;
dx=0;
}

card.addEventListener("mousedown",down);
window.addEventListener("mousemove",move);
window.addEventListener("mouseup",up);

card.addEventListener("touchstart",down);
window.addEventListener("touchmove",move);
window.addEventListener("touchend",up);

renderStats();
createDeck();
nextCard();
</script>
</body>
</html>
